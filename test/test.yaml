# project specific parameters including data and reference
cores: 64

# can be "ECLIP10", "ECLIP6", "TAKARAV3", "SACSEQV3", "STRANDED"
libtype: ECLIP6
base_change: 'A,G'
markdup: true
strandness: true
gene_norc: true
splice_genome: true

cutoff:
  min_uncon: 1
  min_depth: 10
  min_ratio: 0.05
  min_pval: 0.05

# build in configure for the pipeline
path:
  cutseq: /usr/local/bin/cutseq
  samtools: samtools
  hisat3n: hisat-3n
  hisat3nbuild: hisat-3n-build
  hisat3ntable: hisat-3n-table
  umicollapse: umicollapse
  picard: picard
  annotateMotif: python ../bin/annotate_motif.py
  collectReadCounts: python ../bin/collect_read_counts.py
  convertPileup: python ../bin/pileup_to_arrow.py
  joinPileup: python ../bin/join_pileup.py
  filterSites: python ../bin/filter_sites.py

# if the genome index is not available, the pipeline will build it automatically
genome_index: ref/Escherichia_coli_BL21_CP001509.3

reference:
  contamination:
    - ref/PET28a-tadA.fa
  genes:
    - ref/rRNA.fa
  genome:
    - ref/Escherichia_coli_BL21_CP001509.3.fa

samples:
  Ecoli:
    data:
      - R1: data/Ecoli_R1.fastq.gz
        R2: data/Ecoli_R2.fastq.gz
