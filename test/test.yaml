# project specific parameters including data and reference
cores: 64

# can be "ECLIP10", "ECLIP6", "TAKARAV3", "SACSEQV3", "STRANDED"
libtype: ECLIP6
base_change: 'A,G'
markdup: true
strandness: true
gene_norc: true
splice_genome: true

cutoff:
  min_uncon: 1
  min_depth: 10
  min_ratio: 0.05
  min_pval: 0.05

# build in configure for the pipeline
path:
  cutseq: /opt/app_venv/bin/cutseq
  samtools: /pipeline/samtools/samtools
  hisat3n: /pipeline/hisat2-hisat-3n/hisat-3n
  hisat3nbuild: /pipeline/hisat2-hisat-3n/hisat-3n-build
  hisat3ntable: /pipeline/hisat2-hisat-3n/hisat-3n-table
  umicollapse: java -server -XX:InitialRAMPercentage=80.0 -XX:MaxRAMPercentage=80.0 -jar /pipeline/umicollapse/umicollapse.jar bam
  picard: java -server -XX:InitialRAMPercentage=80.0 -XX:MaxRAMPercentage=80.0 -jar /pipeline/picard/picard.jar
  annotateMotif: python /pipeline/script/annotate_motif.py
  collectReadCounts: python /pipeline/script/collect_read_counts.py
  convertPileup: python /pipeline/script/pileup_to_arrow.py
  joinPileup: python /pipeline/script/join_pileup.py
  filterSites: python /pipeline/script/filter_sites.py

# if the genome index is not available, the pipeline will build it automatically
genome_index: ref/Escherichia_coli_BL21_CP001509.3

reference:
  contamination:
    - ref/PET28a-tadA.fa
  genes:
    - ref/rRNA.fa
  genome:
    - ref/Escherichia_coli_BL21_CP001509.3.fa

samples:
  Ecoli:
    data:
      - R1: data/Ecoli_R1.fastq.gz
        R2: data/Ecoli_R2.fastq.gz
